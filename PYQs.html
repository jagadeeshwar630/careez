    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #06080f;
      --surface: #0d1117;
      --card: #111827;
      --border: rgba(99, 102, 241, .15);
      --accent: #6366f1;
      --accent2: #f97316;
      --text: #f1f5f9;
      --muted: #64748b;
      --sidebar: 260px
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --card: #f0f4ff;
      --border: rgba(99, 102, 241, .15);
      --text: #0f172a;
      --muted: #64748b;
    }

    [data-theme="light"] .year-tag { background: #e2e8f0; }
    [data-theme="light"] .filter-select { background: var(--surface); color: var(--text); }

    .s-theme {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 600;
      font-size: .88rem;
      transition: background .2s;
      margin-bottom: .25rem;
    }

    .s-theme:hover {
      background: var(--card);
      color: var(--text);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: var(--sidebar);
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      overflow-y: auto;
      z-index: 50
    }

    .s-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 2rem;
      text-decoration: none
    }

    .s-logo i {
      color: var(--accent)
    }

    .s-nav {
      display: flex;
      flex-direction: column;
      gap: .25rem;
      flex: 1
    }

    .s-nav a {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: 10px;
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      font-size: .88rem;
      transition: all .2s
    }

    .s-nav a:hover {
      background: var(--card);
      color: var(--text)
    }

    .s-nav a.active {
      background: rgba(99, 102, 241, .12);
      color: var(--accent);
      border: 1px solid rgba(99, 102, 241, .2)
    }

    .s-bottom {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: auto
    }

    .s-logout {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem 1rem;
      border-radius: 10px;
      cursor: pointer;
      color: #ef4444;
      font-weight: 600;
      font-size: .88rem;
      cursor: pointer
    }

    .s-logout:hover {
      background: rgba(239, 68, 68, .08)
    }

    .main {
      flex: 1;
      margin-left: var(--sidebar);
      padding: 1.5rem 2rem
    }

    .page-header {
      margin-bottom: 1.25rem
    }

    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: .3rem
    }

    .page-header p {
      color: var(--muted);
      font-size: .95rem
    }

    .filter-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap
    }

    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .7rem 1rem;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-width: 200px;
      cursor: pointer;
      font-size: .9rem;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--accent)
    }

    .pyq-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      animation: fadeIn 0.4s ease-in-out
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .pyq-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      transition: all .3s;
      display: flex;
      flex-direction: column
    }

    .pyq-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent)
    }

    .pyq-exam {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: .3rem
    }

    .pyq-title {
      color: var(--text);
      font-size: .9rem;
      margin-bottom: .5rem
    }

    .pyq-meta {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      color: var(--muted);
      font-size: .75rem
    }

    .pyq-meta i {
      margin-right: .3rem
    }

    .pyq-years {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
      margin-bottom: 1rem
    }

    .year-tag {
      background: var(--card);
      border: 1px solid var(--border);
      padding: .2rem .6rem;
      border-radius: 4px;
      font-size: .7rem;
      color: var(--muted)
    }

    .pyq-footer {
      display: flex;
      gap: .5rem;
      margin-top: auto
    }

    .pyq-btn {
      flex: 1;
      padding: .7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      text-decoration: none;
      text-align: center
    }

    .pyq-btn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    .pyq-btn.download {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .pyq-btn.download:hover {
      background: #4f46e5
    }

    .online-test-banner {
      background: linear-gradient(135deg, rgba(99, 102, 241, .1), rgba(249, 115, 22, .1));
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem
    }

    .banner-text h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      margin-bottom: .3rem
    }

    .banner-text p {
      color: var(--muted);
      font-size: .85rem
    }

    .banner-btn {
      padding: .8rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: .9rem;
      transition: all .2s
    }

    .banner-btn:hover {
      background: #4f46e5;
      transform: translateY(-1px)
    }

    .hamburger {
      display: none;
      position: fixed;
      top: .9rem;
      left: .9rem;
      z-index: 400;
      background: var(--surface);
      border: 1px solid var(--border);
      width: 42px;
      height: 42px;
      border-radius: 10px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      font-size: 1.1rem;
      transition: all .2s;
      box-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    .hamburger:hover { border-color: var(--accent); color: var(--accent); }
    .mob-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 199;
      backdrop-filter: blur(3px);
    }

    @media(max-width:768px) {
      .hamburger { display: flex; }

      .main {

      .filter-bar { flex-direction: column; gap: .6rem; }

      .pyq-grid { grid-template-columns: 1fr; gap: 1rem; }
      .pyq-card { padding: 1rem; }
      .pyq-footer { flex-direction: column; }
      .pyq-btn { width: 100%; padding: .65rem; }
      .online-test-banner { flex-direction: column; text-align: center; }
      .banner-btn { width: 100%; text-align: center; }
    }

  <script type="module">
    import { supabase, requireAuth, signOut } from './supabase-config.js';

    // Theme init
    (function() {
      const t = localStorage.getItem('careez_theme') || 'dark';
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
    window.toggleTheme = function() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if (isLight) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('careez_theme', 'dark'); }
      else { document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('careez_theme', 'light'); }
      _updateThemeBtn();
    };
    function _updateThemeBtn() {
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const icon = document.getElementById('themeIcon');
      const label = document.getElementById('themeLabel');
      if (icon) icon.className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      if (label) label.textContent = isLight ? 'Light Mode' : 'Dark Mode';
    }
    _updateThemeBtn();

    window.toggleMobMenu = function() {
      document.querySelector('.sidebar').classList.toggle('open');
      document.getElementById('mobOverlay').classList.toggle('open');
    };
    window.closeMobMenu = function() {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('mobOverlay').classList.remove('open');
    };
    document.querySelectorAll('.s-nav a').forEach(a => a.addEventListener('click', window.closeMobMenu));

    let pyqs = [];

    async function fetchPYQs() {
      const { data, error } = await supabase.from('PYQs').select('*');
      if (error) {
        console.error('Error fetching PYQs:', error);
        return;
      }
      pyqs = [...(data || []), ...PYQS_LOCAL.filter(p => !(data || []).some(dbP => dbP.download_url === p.download_url))];
      
      // Dynamically populate exam filter
      const examFilter = document.getElementById('examFilter');
      const uniqueExams = [...new Set(pyqs.map(p => p.exam_id))].filter(Boolean);
      uniqueExams.forEach(eid => {
        if (![...examFilter.options].some(opt => opt.value === eid)) {
          const opt = document.createElement('option');
          opt.value = eid;
          opt.textContent = eid.toUpperCase();
          examFilter.appendChild(opt);
        }
      });
      // Dynamically populate year filter
      const yearFilter = document.getElementById('yearFilter');
      const uniqueYears = [...new Set(pyqs.map(p => p.year))].filter(Boolean).sort((a,b) => b-a);
      uniqueYears.forEach(y => {
        if (![...yearFilter.options].some(opt => opt.value == y)) {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          yearFilter.appendChild(opt);
        }
      });

      window.filterPYQs();
    }

    let currentExamFilter = 'all';
    let currentYearFilter = 'all';

    function renderPYQs() {
      const grid = document.getElementById('pyqGrid');
      if (!grid) return;
      const filtered = pyqs.filter(p => {
        // Use exam_id for filtering
        if (currentExamFilter !== 'all' && p.exam_id !== currentExamFilter) return false;
        if (currentYearFilter !== 'all' && p.year !== parseInt(currentYearFilter)) return false;
        return true;
      });

      grid.innerHTML = filtered.map(p => {
        return `
    <div class="pyq-card">
      <div class="pyq-exam">${p.exam_id || 'Exam Paper'}</div>
      <div class="pyq-title">${p.paper_name}</div>
      <div class="pyq-meta">
        <span><i class="fa-regular fa-file-pdf"></i> PDF</span>
        <span><i class="fa-regular fa-calendar"></i> ${p.year}</span>
      </div>
      <div class="pyq-footer">
        <a href="${p.download_url}" class="pyq-btn download" target="_blank" download>
          <i class="fa-solid fa-download"></i> Download
        </a>
        <a href="${p.download_url}" class="pyq-btn" target="_blank">
          <i class="fa-regular fa-eye"></i> View
        </a>
      </div>
    </div>
  `}).join('');

      if (filtered.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted);">
          <i class="fa-regular fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem;"></i>
          <p>No papers found for this selection.</p>
        </div>`;
      }
    }




    window.filterPYQs = function () {
      currentExamFilter = document.getElementById('examFilter').value;
      currentYearFilter = document.getElementById('yearFilter').value;
      renderPYQs();
    }

    window.downloadPYQ = function (exam, title) {
      // Simulate download
      alert(`📥 Download started for:\n${exam} - ${title}\n\nIn production, this would download the actual PDF.`);
    }

    window.viewSolutions = function (exam, title) {
      alert(`📝 Solutions for:\n${exam} - ${title}\n\nIn production, this would show detailed solutions.`);
    }

    window.logout = async function () {
      await signOut();
      localStorage.removeItem('careez_logged_in');
      window.location.href = 'login.html';
    }

    async function init() {
      const authData = await requireAuth();
      if (!authData) return;

      // Check for filter from exams page
      const filterExam = localStorage.getItem('filter_exam');
      if (filterExam) {
        document.getElementById('examFilter').value = filterExam.split(' ')[0];
        localStorage.removeItem('filter_exam');
      }
      
      fetchPYQs();
    }


    window.onload = init;
  </script>
