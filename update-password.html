<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareeZ | Update Password</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg: #06080f;
      --surface: #0d1117;
      --card: #111827;
      --border: rgba(99, 102, 241, .18);
      --accent: #6366f1;
      --text: #f1f5f9;
      --muted: #64748b;
      --error: #ef4444
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --card: #f0f4ff;
      --border: rgba(99, 102, 241, .18);
      --text: #0f172a;
      --muted: #64748b;
    }

    [data-theme="light"] .error-msg {
      background: #fee2e2;
      color: #991b1b;
    }

    [data-theme="light"] .success-msg {
      background: #dcfce7;
      color: #166534;
      border-color: #16a34a;
    }

    [data-theme="light"] .container {
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.08);
    }

    .theme-toggle-float {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all .2s;
      z-index: 200;
    }

    .theme-toggle-float:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 40px;
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .form-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .form-logo i {
      color: var(--accent)
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: .4rem;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
      font-size: .95rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.1rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: .4rem;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .form-group input {
      width: 100%;
      padding: .85rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      font-size: .95rem;
      transition: border-color .2s, box-shadow .2s;
      outline: none
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12)
    }

    .error-msg {
      background: #450a0a;
      border: 1px solid var(--error);
      color: #fca5a5;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .88rem;
      margin-top: 1rem;
      display: none;
      text-align: center;
    }

    .success-msg {
      background: #064e3b;
      border: 1px solid #059669;
      color: #6ee7b7;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .88rem;
      margin-top: 1rem;
      display: none;
      text-align: center;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Manrope', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem
    }

    .submit-btn:hover {
      background: #4f46e5;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, .35)
    }

    .submit-btn:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 2.3rem;
      color: var(--muted);
      cursor: pointer;
      padding: 5px;
      transition: color .2s
    }

    .password-toggle:hover {
      color: var(--accent)
    }
    
    .back-login {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    
    .back-login:hover {
      color: var(--accent);
    }
  </style>
</head>

<body>

  <button class="theme-toggle-float" id="themeToggleBtn" aria-label="Toggle theme"><i class="fa-solid fa-moon"></i></button>

  <div class="container">
    <div class="form-logo"><i class="fa-solid fa-graduation-cap"></i> CareeZ</div>
    <h1>Secure Your Account</h1>
    <p class="subtitle">Enter your new password below</p>

    <form id="updateForm">
      <div class="form-group">
        <label>NEW PASSWORD</label>
        <input type="password" id="password" placeholder="••••••••••••" required>
        <i class="fa-solid fa-eye-slash password-toggle" onclick="togglePasswordVisibility('password', this)"></i>
      </div>
      
      <div class="form-group">
        <label>CONFIRM NEW PASSWORD</label>
        <input type="password" id="confirmPassword" placeholder="••••••••••••" required>
        <i class="fa-solid fa-eye-slash password-toggle" onclick="togglePasswordVisibility('confirmPassword', this)"></i>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <button type="submit" class="submit-btn" id="updateBtn">
        <i class="fa-solid fa-key"></i> Update Password
      </button>
      
      <a href="login.html" class="back-login">← Back to Login</a>
    </form>
  </div>

  <script>
    // Theme init
    (function(){
      const t = localStorage.getItem('careez_theme') || 'dark';
      if(t==='light') document.documentElement.setAttribute('data-theme','light');
    })();
    const _ttBtn = document.getElementById('themeToggleBtn');
    function _updateThemeIcon(){
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if(_ttBtn) _ttBtn.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    }
    _updateThemeIcon();
    if(_ttBtn) _ttBtn.addEventListener('click', function(){
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      if(isLight){ document.documentElement.removeAttribute('data-theme'); localStorage.setItem('careez_theme','dark'); }
      else { document.documentElement.setAttribute('data-theme','light'); localStorage.setItem('careez_theme','light'); }
      _updateThemeIcon();
    });

    function togglePasswordVisibility(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      }
    }
  </script>

  <script type="module">
    import { supabase } from './supabase-config.js';

    // When the user comes from the reset email, Supabase processes the hash automatically
    // and sets a session. We just need to wait for it or verify it.
    
    document.addEventListener('DOMContentLoaded', async () => {
        // Sometimes the session is fully formed after a redirect. Let's make sure we have it.
        const { data: { session }, error } = await supabase.auth.getSession();
        if (!session) {
            // We may not strictly need to catch it here, as updateUser works if the token is valid,
            // but it's good as a sanity check.
            console.log("No active session found. The update might fail or you are just accessing this directly without a token.");
        }
    });

    document.getElementById('updateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const pwd = document.getElementById('password').value;
      const pwdConfirm = document.getElementById('confirmPassword').value;
      const err = document.getElementById('errorMsg');
      const succ = document.getElementById('successMsg');
      const btn = document.getElementById('updateBtn');

      err.style.display = 'none';
      succ.style.display = 'none';

      if (pwd !== pwdConfirm) {
        err.textContent = 'Passwords do not match!';
        err.style.display = 'block';
        return;
      }
      
      if (pwd.length < 6) {
        err.textContent = 'Password should be at least 6 characters.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Updating...';

      try {
        const { data, error } = await supabase.auth.updateUser({
          password: pwd
        });

        if (error) {
          throw error;
        }

        succ.textContent = 'Password updated successfully! Redirecting...';
        succ.style.display = 'block';
        
        setTimeout(() => {
          // You could redirect them to the dashboard/roadmap since they are logged in now
          window.location.href = 'roadmap.html';
        }, 2000);
        
      } catch (ex) {
        err.textContent = ex.message || 'An error occurred updating the password.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-key"></i> Update Password';
      }
    });
  </script>
</body>
</html>
